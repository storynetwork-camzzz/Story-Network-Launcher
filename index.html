<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Story Network</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif}
:root{
  --bg:#02020a;
  --text-primary:#dde0ff;
  --text-muted:#4a4a88;
  --blue:#0000ff;
  --border:rgba(0,0,255,0.35);
  --blue-glow:rgba(0,0,255,0.3);
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text-primary);overflow:hidden}
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
#launcher{position:relative;z-index:2;width:100%;height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{
  flex-shrink:0;padding:22px 60px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,0,255,0.3);
  background:#02020e;box-shadow:0 2px 24px rgba(0,0,255,0.08);
  position:relative;z-index:10;
}
.header-left{display:flex;align-items:center;gap:16px}
.hlogo img{width:56px;height:56px;object-fit:contain;display:block;filter:drop-shadow(0 0 12px rgba(0,0,255,0.5))}
.htitle{font-size:1.35rem;font-weight:900;letter-spacing:0.06em;color:#fff;text-shadow:0 0 24px rgba(0,0,255,0.5)}
.htitle span{color:var(--blue)}
.hsub{font-size:0.68rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);margin-top:3px}
.header-right{display:flex;align-items:center;gap:12px}

#back-btn{
  display:none;align-items:center;gap:8px;
  padding:9px 18px;border-radius:11px;
  border:1px solid rgba(0,0,255,0.4);background:rgba(0,0,255,0.08);
  color:var(--text-primary);font-size:0.75rem;font-weight:800;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
  transition:background 0.2s,border-color 0.2s,color 0.2s;
}
#back-btn:hover{background:rgba(0,0,255,0.2);border-color:rgba(0,0,255,0.7);color:#fff}
#back-btn.visible{display:flex}

/* VIEWS */
#view-home,#view-folder{
  flex:1;padding:36px 60px;
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(0,0,255,0.3) transparent;
}
#view-home::-webkit-scrollbar,#view-folder::-webkit-scrollbar{width:4px}
#view-home::-webkit-scrollbar-thumb,#view-folder::-webkit-scrollbar-thumb{background:rgba(0,0,255,0.3);border-radius:4px}
#view-folder{display:none}

/* FOLDER VIEW HEADER */
.folder-view-header{
  display:flex;align-items:center;gap:14px;margin-bottom:28px;
  padding-bottom:20px;border-bottom:1px solid rgba(0,0,255,0.15);
}
.folder-view-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.folder-view-title{font-size:1.3rem;font-weight:900;letter-spacing:0.04em;color:#fff;text-shadow:0 0 20px rgba(0,0,255,0.3)}
.folder-view-count{font-size:0.65rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-top:3px}

/* SHARED CARD GRID — same for both home and folder views */
#folder-grid,#project-grid{
  width:100%;display:grid;
  grid-template-columns:repeat(4,1fr);gap:18px;
}
@media(max-width:1200px){#folder-grid,#project-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){#folder-grid,#project-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){#folder-grid,#project-grid{grid-template-columns:1fr}}

/* FOLDER CARD — matches project card proportions exactly, no banner/icon area */
.folder-card{
  background:rgba(8,8,28,0.97);
  border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
  cursor:pointer;display:flex;flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,255,0.05);
  transition:transform 0.22s ease,border-color 0.22s ease,box-shadow 0.22s ease;
}
.folder-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 16px 40px rgba(0,0,0,0.6)}

.folder-card-body{padding:20px 18px 18px;display:flex;flex-direction:column;flex:1}

.folder-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.folder-card-name{font-size:0.95rem;font-weight:900;letter-spacing:0.04em;text-shadow:0 0 14px rgba(0,0,255,0.3);line-height:1.2}
.folder-card-icon-svg{flex-shrink:0;opacity:0.5;margin-top:1px;transition:opacity 0.2s}
.folder-card:hover .folder-card-icon-svg{opacity:0.85}
.folder-card-meta{font-size:0.7rem;font-weight:600;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}
.folder-card-items{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.folder-item-chip{
  font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  color:var(--text-muted);
}
.folder-card-btn{
  margin-top:14px;width:100%;padding:10px;border-radius:11px;border:none;
  color:#fff;font-size:0.76rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;position:relative;overflow:hidden;
  transition:opacity 0.15s,transform 0.1s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.folder-card-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.14) 0%,transparent 60%);pointer-events:none}
.folder-card-btn:hover{opacity:0.85}
.folder-card-btn:active{transform:scale(0.98)}
.folder-card-arrow{transition:transform 0.2s}
.folder-card:hover .folder-card-arrow{transform:translateX(3px)}

/* WARNING BADGE */
.card-wrap{position:relative}
.card-warn{
  position:absolute;top:10px;right:10px;z-index:5;
  display:flex;align-items:center;gap:5px;
  padding:4px 9px;border-radius:20px;
  background:rgba(255,40,40,0.18);border:1px solid rgba(255,60,60,0.55);
  font-size:0.58rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
  color:#ff6060;backdrop-filter:blur(4px);
  pointer-events:none;
}
.card-warn-dot{width:5px;height:5px;border-radius:50%;background:#ff4444;flex-shrink:0;box-shadow:0 0 6px rgba(255,60,60,0.8);animation:pulse-dot 1.8s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.35}}

/* PROJECT CARD */
.card{
  background:rgba(8,8,28,0.97);
  border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
  cursor:pointer;display:flex;flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,255,0.05);
  transition:transform 0.22s ease,border-color 0.22s ease,box-shadow 0.22s ease;
}
.card:hover{transform:translateY(-5px) scale(1.02);border-color:var(--blue);box-shadow:0 0 50px var(--blue-glow),0 16px 40px rgba(0,0,0,0.6)}
.card-banner{height:90px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-banner-inner{position:absolute;inset:0;opacity:0.22}
.card-logo{width:52px;height:52px;border-radius:13px;object-fit:contain;position:relative;z-index:1;box-shadow:0 4px 18px rgba(0,0,0,0.6)}
.card-body{padding:15px 17px 17px;display:flex;flex-direction:column;flex:1}
.card-name{font-size:0.92rem;font-weight:900;color:#fff;letter-spacing:0.04em;margin-bottom:6px;text-shadow:0 0 14px rgba(0,0,255,0.3)}
.card-desc{font-size:0.73rem;font-weight:500;color:var(--text-muted);line-height:1.6;flex:1;margin-bottom:13px}
.card-btn{width:100%;padding:10px;border-radius:11px;border:none;color:#fff;font-size:0.76rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:opacity 0.15s,transform 0.1s;display:flex;align-items:center;justify-content:center;gap:7px}
.card-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.14) 0%,transparent 60%);pointer-events:none}
.card-btn:hover{opacity:0.85}
.card-btn:active{transform:scale(0.98)}
.card-btn-arrow{transition:transform 0.2s}
.card:hover .card-btn-arrow{transform:translateX(3px)}

/* MODAL */
#overlay{position:fixed;inset:0;z-index:500;background:rgba(2,2,10,0.85);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s ease}
#overlay.open{opacity:1;pointer-events:all}
#modal{width:min(520px,88vw);background:rgba(8,8,28,0.99);border:1px solid rgba(0,0,255,0.5);border-radius:22px;overflow:hidden;box-shadow:0 0 80px rgba(0,0,255,0.14),0 32px 64px rgba(0,0,0,0.85);transform:scale(0.92) translateY(20px);transition:transform 0.28s cubic-bezier(0.16,1,0.3,1)}
#overlay.open #modal{transform:scale(1) translateY(0)}
#modal-banner{height:110px;position:relative;display:flex;align-items:center;justify-content:center}
#modal-banner-bg{position:absolute;inset:0;opacity:0.22}
#modal-logo{width:66px;height:66px;border-radius:16px;object-fit:contain;position:relative;z-index:1;box-shadow:0 4px 24px rgba(0,0,0,0.7)}
#modal-close{position:absolute;top:13px;right:15px;z-index:5;background:rgba(255,255,255,0.08);border:1px solid rgba(0,0,255,0.3);border-radius:50%;width:32px;height:32px;font-size:15px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,color 0.2s}
#modal-close:hover{background:rgba(0,0,255,0.2);color:#fff}
#modal-body{padding:22px 28px 26px}
#modal-tag{display:flex;align-items:center;gap:6px;margin-bottom:6px}
#modal-tag-dot{width:5px;height:5px;border-radius:50%}
#modal-sub-text{font-size:0.65rem;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted)}
#modal-name{font-size:1.2rem;font-weight:900;color:#fff;letter-spacing:0.06em;margin-bottom:12px;text-shadow:0 0 20px rgba(0,0,255,0.4)}
#modal-desc{font-size:0.84rem;font-weight:500;color:rgba(200,210,230,0.65);line-height:1.7;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(0,0,255,0.15)}
#modal-status{font-size:0.72rem;font-weight:700;letter-spacing:0.06em;color:var(--text-muted);min-height:1.1em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
#modal-status.err{color:#ff3355}
.modal-row{display:flex;gap:10px}
#modal-go{flex:1;padding:14px;border-radius:12px;border:none;color:#fff;font-size:0.84rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:opacity 0.15s,transform 0.1s;display:flex;align-items:center;justify-content:center;gap:8px}
#modal-go::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.14) 0%,transparent 60%);pointer-events:none}
#modal-go:hover{opacity:0.85}
#modal-go:active{transform:scale(0.98)}
#modal-go:disabled{opacity:0.35;cursor:not-allowed}
#modal-cancel{padding:14px 18px;border-radius:12px;border:1px solid rgba(0,0,255,0.35);background:transparent;color:var(--text-muted);font-size:0.78rem;font-weight:700;cursor:pointer;transition:border-color 0.2s,color 0.2s}
#modal-cancel:hover{border-color:rgba(0,0,255,0.7);color:#fff}

/* LOAD / FRAME */
#loadscreen{display:none;position:fixed;inset:0;z-index:9998;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:18px}
#loadscreen.on{display:flex}
.spin{width:40px;height:40px;border-radius:50%;border:3px solid rgba(0,0,255,0.15);border-top-color:var(--blue);animation:spinning 0.8s linear infinite}
@keyframes spinning{to{transform:rotate(360deg)}}
.loadlabel{font-size:0.72rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted)}
#appframe{display:none;position:fixed;inset:0;z-index:9999;width:100%;height:100%;border:none}
#appframe.on{display:block}

/* FOOTER */
footer{flex-shrink:0;padding:12px 60px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(0,0,255,0.18);background:#02020e}
.footer-left{display:flex;align-items:center;gap:18px}
.footer-text{font-size:0.64rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted)}
.footer-dot{color:rgba(0,0,255,0.4);font-size:0.5rem}
.footer-right{font-size:0.64rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted)}
</style>

<script>
// BG
(function(){
  var c=document.getElementById('bgCanvas'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  // Moving nodes
  var pts=[];
  for(var i=0;i<55;i++)pts.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:Math.random()*2+.5,o:Math.random()*.5+.1});
  // Static twinkling stars
  var stars=[];
  for(var i=0;i<220;i++)stars.push({x:Math.random()*3000,y:Math.random()*2000,r:Math.random()*1.1+.2,o:Math.random()*.7+.15,phase:Math.random()*Math.PI*2,speed:Math.random()*.015+.005});
  var t=0;
  function draw(){
    t+=1;
    ctx.clearRect(0,0,c.width,c.height);
    var g=ctx.createRadialGradient(c.width*.5,c.height*.5,0,c.width*.5,c.height*.5,c.width*.75);
    g.addColorStop(0,'rgba(0,0,40,0.55)');g.addColorStop(.5,'rgba(0,0,20,0.3)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
    // Draw twinkling stars first
    for(var s=0;s<stars.length;s++){
      var st=stars[s];
      var sx=st.x%c.width,sy=st.y%c.height;
      var twinkle=st.o*(0.55+0.45*Math.sin(t*st.speed+st.phase));
      ctx.beginPath();ctx.arc(sx,sy,st.r,0,Math.PI*2);
      ctx.fillStyle='rgba(180,190,255,'+twinkle+')';ctx.fill();
    }
    // Draw node connections
    for(var a=0;a<pts.length;a++)for(var b=a+1;b<pts.length;b++){
      var dx=pts[a].x-pts[b].x,dy=pts[a].y-pts[b].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<140){ctx.beginPath();ctx.moveTo(pts[a].x,pts[a].y);ctx.lineTo(pts[b].x,pts[b].y);ctx.strokeStyle='rgba(0,0,255,'+(0.12*(1-d/140))+')';ctx.lineWidth=.6;ctx.stroke()}
    }
    for(var i=0;i<pts.length;i++){
      var p=pts[i];ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(0,0,255,'+p.o+')';ctx.fill();
      if(p.r>1.5){ctx.beginPath();ctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);ctx.fillStyle='rgba(0,0,255,'+(p.o*.12)+')';ctx.fill()}
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-10)p.x=c.width+10;if(p.x>c.width+10)p.x=-10;if(p.y<-10)p.y=c.height+10;if(p.y>c.height+10)p.y=-10;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

     logo:'https://codehs.com/uploads/84799a0bb8e09668879b73acd5e7abaa',
     url:'https://cdn.jsdelivr.net/gh/storynetwork-camzzz/SN-Code-Runner@latest/index.html',
     accent:'#0000ff',banner:'linear-gradient(135deg,#000033,#0000ff)'},
    {id:'sntools',name:'SN Tools',sub:'Utilities',
     desc:'A bunch of useful tools for developers and more.',
     logo:'https://codehs.com/uploads/8fb15ed88f915194ff510551f016176e',
     url:'https://cdn.jsdelivr.net/gh/storynetwork-camzzz/SN-Tools@latest/index.html',
     accent:'#4facfe',banner:'linear-gradient(135deg,#001a33,#4facfe)'},
    {id:'codehslaunching',name:'CodeHS Launching',sub:'Utilities',
     desc:'A launcher utility for CodeHS projects.',
     logo:'https://codehs.com/uploads/8fb15ed88f915194ff510551f016176e',
     url:'https://cdn.jsdelivr.net/gh/storynetwork-camzzz/CodeHS-Launching@latest/index.html',
     accent:'#e0e0e0',banner:'linear-gradient(135deg,#111111,#555555)'}
   ]}
];

var totalProjects=FOLDERS.reduce(function(a,f){return a+f.projects.length},0);
document.getElementById('footer-right').textContent=FOLDERS.length+' Folders · '+totalProjects+' Projects';

// BUILD FOLDER CARDS
var folderGrid=document.getElementById('folder-grid');
FOLDERS.forEach(function(f){
  var rgb=hexToRgb(f.color);

  var card=document.createElement('div');
  card.className='folder-card';
  card.style.borderColor='rgba('+rgb+',0.4)';

  card.addEventListener('mouseenter',function(){
    card.style.borderColor='rgba('+rgb+',0.8)';
    card.style.boxShadow='0 0 50px rgba('+rgb+',0.18),0 16px 40px rgba(0,0,0,0.6)';
  });
  card.addEventListener('mouseleave',function(){
    card.style.borderColor='rgba('+rgb+',0.4)';
    card.style.boxShadow='';
  });
  card.addEventListener('click',function(){openFolder(f)});

  // Body
  var body=document.createElement('div');body.className='folder-card-body';

  // Name row with folder icon on the right
  var hdr=document.createElement('div');hdr.className='folder-card-header';

  var name=document.createElement('div');name.className='folder-card-name';
  name.textContent=f.name;
  name.style.color=f.color;
  name.style.textShadow='0 0 16px rgba('+rgb+',0.4)';
  hdr.appendChild(name);

  // SVG folder icon
  var iconSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  iconSvg.setAttribute('width','22');iconSvg.setAttribute('height','22');
  iconSvg.setAttribute('viewBox','0 0 24 24');iconSvg.setAttribute('fill','none');
  iconSvg.classList.add('folder-card-icon-svg');
  var p1=document.createElementNS('http://www.w3.org/2000/svg','path');
  p1.setAttribute('d','M3 7C3 5.89543 3.89543 5 5 5H9.58579C9.851 5 10.1054 5.10536 10.2929 5.29289L11.7071 6.70711C11.8946 6.89464 12.149 7 12.4142 7H19C20.1046 7 21 7.89543 21 9V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V7Z');
  p1.setAttribute('stroke',f.color);p1.setAttribute('stroke-width','1.8');p1.setAttribute('stroke-linejoin','round');
  iconSvg.appendChild(p1);
  hdr.appendChild(iconSvg);
  body.appendChild(hdr);

  var meta=document.createElement('div');meta.className='folder-card-meta';
  meta.textContent=f.projects.length+(f.projects.length===1?' project':' projects');
  body.appendChild(meta);

  var chips=document.createElement('div');chips.className='folder-card-items';
  f.projects.forEach(function(p){
    var chip=document.createElement('div');chip.className='folder-item-chip';chip.textContent=p.name;
    chips.appendChild(chip);
  });
  body.appendChild(chips);

  var btn=document.createElement('button');btn.className='folder-card-btn';
  btn.style.background=f.color;
  btn.style.boxShadow='0 0 28px rgba('+rgb+',0.4),0 4px 14px rgba(0,0,0,0.4)';
  var lbl=document.createElement('span');lbl.textContent='OPEN FOLDER';
  var arr=document.createElement('span');arr.className='folder-card-arrow';arr.textContent='→';
  btn.appendChild(lbl);btn.appendChild(arr);
  btn.addEventListener('click',function(e){e.stopPropagation();openFolder(f)});
  body.appendChild(btn);

  card.appendChild(body);
  folderGrid.appendChild(card);
});

// OPEN FOLDER
function openFolder(f){
  var rgb=hexToRgb(f.color);

  var fvIcon=document.getElementById('fv-icon');
  fvIcon.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 7C3 5.89543 3.89543 5 5 5H9.58579C9.851 5 10.1054 5.10536 10.2929 5.29289L11.7071 6.70711C11.8946 6.89464 12.149 7 12.4142 7H19C20.1046 7 21 7.89543 21 9V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V7Z" stroke="'+f.color+'" stroke-width="1.8" stroke-linejoin="round"/></svg>';
  fvIcon.style.background='rgba('+rgb+',0.12)';
  fvIcon.style.border='1px solid rgba('+rgb+',0.3)';

  document.getElementById('fv-title').textContent=f.name;
  document.getElementById('fv-title').style.color=f.color;
  document.getElementById('fv-title').style.textShadow='0 0 20px rgba('+rgb+',0.4)';
  document.getElementById('fv-count').textContent=f.projects.length+(f.projects.length===1?' project':' projects');

  var pg=document.getElementById('project-grid');
  pg.innerHTML='';
  // Always use responsive grid — no override for single project
  pg.style.gridTemplateColumns='';

  f.projects.forEach(function(p){
    var accent=p.accent||'#0000ff';
    var argb=hexToRgb(accent);

    var wrap=document.createElement('div');wrap.className='card-wrap';

    var card=document.createElement('div');card.className='card';card.style.position='relative';

    // Warning badge — inside card so it follows the hover transform
    if(p.warn){
      var badge=document.createElement('div');badge.className='card-warn';
      var bdot=document.createElement('div');bdot.className='card-warn-dot';
      badge.appendChild(bdot);
      var btxt=document.createTextNode(p.warn);
      badge.appendChild(btxt);
      card.appendChild(badge);
    }

    var banner=document.createElement('div');banner.className='card-banner';
    var bg=document.createElement('div');bg.className='card-banner-inner';bg.style.background=p.banner;banner.appendChild(bg);
    var logo=document.createElement('img');logo.className='card-logo';logo.src=p.logo;logo.alt=p.name;
    logo.style.filter='drop-shadow(0 0 8px rgba('+argb+',0.5))';
    logo.onerror=function(){logo.style.display='none'};
    banner.appendChild(logo);card.appendChild(banner);

    var body=document.createElement('div');body.className='card-body';
    var cname=document.createElement('div');cname.className='card-name';cname.textContent=p.name;body.appendChild(cname);
    var desc=document.createElement('div');desc.className='card-desc';desc.textContent=p.desc;body.appendChild(desc);

    var btn=document.createElement('button');btn.className='card-btn';
    btn.style.background=accent;
    btn.style.boxShadow='0 0 28px rgba('+argb+',0.5),0 4px 14px rgba(0,0,0,0.4)';
    // Use dark text for light accent colors
    var isLight=(parseInt(accent.slice(1,3),16)*0.299+parseInt(accent.slice(3,5),16)*0.587+parseInt(accent.slice(5,7),16)*0.114)>160;
    btn.style.color=isLight?'#111':'#fff';
    var lbl=document.createElement('span');lbl.textContent='LAUNCH';
    var arr=document.createElement('span');arr.className='card-btn-arrow';arr.textContent='→';
    btn.appendChild(lbl);btn.appendChild(arr);
    btn.addEventListener('click',function(e){e.stopPropagation();openModal(p)});
    body.appendChild(btn);

    card.appendChild(body);
    card.addEventListener('click',function(){openModal(p)});
    wrap.appendChild(card);
    pg.appendChild(wrap);
  });

  document.getElementById('view-home').style.display='none';
  document.getElementById('view-folder').style.display='block';
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('header-sub').textContent=f.name;
  document.getElementById('footer-right').textContent=f.projects.length+(f.projects.length===1?' project':' projects');
}

function goHome(){
  document.getElementById('view-home').style.display='';
  document.getElementById('view-folder').style.display='none';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('header-sub').textContent='Project Launcher';
  document.getElementById('footer-right').textContent=FOLDERS.length+' Folders · '+totalProjects+' Projects';
}

// MODAL
var active=null;
function openModal(p){
  active=p;
  var accent=p.accent||'#0000ff';
  document.getElementById('modal-banner-bg').style.background=p.banner;
  var ml=document.getElementById('modal-logo');ml.src=p.logo;ml.style.display='block';
  ml.style.filter='drop-shadow(0 0 10px rgba('+hexToRgb(accent)+',0.6))';
  ml.onerror=function(){ml.style.display='none'};
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-sub-text').textContent=p.sub;
  document.getElementById('modal-tag-dot').style.background=accent;
  document.getElementById('modal-desc').textContent=p.desc;
  var st=document.getElementById('modal-status');st.textContent='';st.className='';
  var go=document.getElementById('modal-go');go.disabled=false;
  document.getElementById('modal-go-label').textContent='LAUNCH PROJECT';
  document.getElementById('modal-go-arrow').textContent='→';
  go.style.background=accent;
  go.style.boxShadow='0 0 32px rgba('+hexToRgb(accent)+',0.45),0 4px 16px rgba(0,0,0,0.4)';
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');active=null}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

function doLaunch(){
  if(!active)return;var p=active;
  if(p.external){window.open(p.url,'_blank');closeModal();return}
  var st=document.getElementById('modal-status');
  var go=document.getElementById('modal-go');
  st.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);border-top-color:#fff;animation:spinning 0.7s linear infinite;flex-shrink:0"></span>&nbsp;Fetching project files…';
  st.className='';go.disabled=true;
  document.getElementById('modal-go-label').textContent='Loading…';
  document.getElementById('modal-go-arrow').textContent='';
  fetch(p.url).then(function(r){
    if(!r.ok)throw new Error('Fetch failed ('+r.status+')');return r.text();
  }).then(function(html){
    var baseUrl=p.url.substring(0,p.url.lastIndexOf('/')+1);
    html=html.replace(/<head([^>]*)>/i,'<head$1><base href="'+baseUrl+'">');
    closeModal();
    var accent=p.accent||'#0000ff';
    document.getElementById('spin').style.borderTopColor=accent;
    document.getElementById('loadlabel').textContent='Loading '+p.name+'…';
    document.getElementById('loadscreen').classList.add('on');
    document.getElementById('launcher').style.display='none';
    var frame=document.getElementById('appframe');frame.classList.add('on');
    var doc=frame.contentDocument||frame.contentWindow.document;
    doc.open();doc.write(html);doc.close();
    frame.addEventListener('load',function(){document.getElementById('loadscreen').classList.remove('on')},{once:true});
    setTimeout(function(){document.getElementById('loadscreen').classList.remove('on')},4000);
  }).catch(function(err){
    st.textContent='Error: '+err.message;st.className='err';
    go.disabled=false;
    document.getElementById('modal-go-label').textContent='RETRY';
    document.getElementById('modal-go-arrow').textContent='→';
  });
}
</script>
</body>
